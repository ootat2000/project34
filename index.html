<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Сапёр</title>
<style>
  canvas {
    border: 1px solid #000;
  }
</style>
</head>
<body>
<canvas id="minesweeper" width="480" height="480"></canvas>
<script>
const canvas = document.getElementById('minesweeper');
const ctx = canvas.getContext('2d');

const CELL_SIZE = 30;
const WIDTH = canvas.width / CELL_SIZE;
const HEIGHT = canvas.height / CELL_SIZE;
const MINES_COUNT = 40;

const colors = [
  'black', 'blue', 'green', 'red', 'purple', 'darkred', 'teal', 'black', 'gray'
];

class Cell {
  constructor() {
    this.isMine = false;
    this.isOpen = false;
    this.isFlagged = false;
    this.adjacentMines = 0;
  }
}

class Game {
  constructor() {
    this.board = [];
    for (let y=0; y<HEIGHT; y++) {
      this.board[y] = [];
      for (let x=0; x<WIDTH; x++) {
        this.board[y][x] = new Cell();
      }
    }
    this.gameOver = false;
    this.win = false;
    this.firstClick = true; // флаг первого клика
    // Мины не размещаются сразу
  }

  placeMinesSafe(excludeX, excludeY) {
    // Создаем список безопасных клеток (выбранная и соседи)
    const safeCells = [{ x: excludeX, y: excludeY }];
    for (let dy=-1; dy<=1; dy++) {
      for (let dx=-1; dx<=1; dx++) {
        const nx=excludeX+dx, ny=excludeY+dy;
        if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
          safeCells.push({ x: nx, y: ny });
        }
      }
    }
    const safeSet = new Set(safeCells.map(c => c.y + ',' + c.x));

    // Распределяем мины, исключая безопасные клетки
    let count = 0;
    while (count < MINES_COUNT) {
      const x = Math.floor(Math.random() * WIDTH);
      const y = Math.floor(Math.random() * HEIGHT);
      if (
        !this.board[y][x].isMine &&
        !safeSet.has(y + ',' + x)
      ) {
        this.board[y][x].isMine = true;
        count++;
      }
    }
  }

  calculateAdjacents() {
    for (let y=0; y<HEIGHT; y++) {
      for (let x=0; x<WIDTH; x++) {
        if (this.board[y][x].isMine) continue;
        let count = 0;
        for (let dy=-1; dy<=1; dy++) {
          for (let dx=-1; dx<=1; dx++) {
            const nx=x+dx, ny=y+dy;
            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
              if (this.board[ny][nx].isMine) count++;
            }
          }
        }
        this.board[y][x].adjacentMines = count;
      }
    }
  }

  openCell(x, y) {
    if (this.gameOver || this.board[y][x].isOpen || this.board[y][x].isFlagged) return;

    // Первый клик
    if (this.firstClick) {
      this.firstClick = false;
      this.relocateMines(x, y);
      this.calculateAdjacents();
      // Открываем область вокруг выбранной клетки, если она не содержит мин
      if (!this.board[y][x].isMine) {
        this.openEmptyArea(x, y);
      }
      this.checkWin();
      return;
    }

    const cell = this.board[y][x];
    cell.isOpen = true;

    if (cell.isMine) {
      this.gameOver = true;
      this.win = false;
      this.revealMines();
      alert('Игра окончена! Проигрыш.');
      return;
    }

    if (cell.adjacentMines === 0) {
      this.openEmptyArea(x, y);
    }

    this.checkWin();
  }

  // Открытие пустых клеток и их соседей
  openEmptyArea(x, y) {
    const stack = [{x, y}];
    while (stack.length > 0) {
      const {x: cx, y: cy} = stack.pop();
      const cell = this.board[cy][cx];

      if (cell.isOpen || cell.isFlagged) continue;
      cell.isOpen = true;

      if (cell.adjacentMines === 0 && !cell.isMine) {
        for (let dy=-1; dy<=1; dy++) {
          for (let dx=-1; dx<=1; dx++) {
            const nx = cx+dx, ny=cy+dy;
            if (nx>=0 && nx<WIDTH && ny>=0 && ny<HEIGHT) {
              if (!this.board[ny][nx].isOpen && !this.board[ny][nx].isFlagged) {
                stack.push({x:nx, y:ny});
              }
            }
          }
        }
      }
    }
  }

  checkWin() {
    let openedCount = 0;
    for (let row of this.board) {
      for (let cell of row) {
        if (cell.isOpen && !cell.isMine) openedCount++;
      }
    }
    if (openedCount === WIDTH*HEIGHT - MINES_COUNT) {
      this.gameOver = true;
      this.win = true;
    }
  }

  revealMines() {
    for (let y=0; y<HEIGHT; y++) {
      for (let x=0; x<WIDTH; x++) {
        if (this.board[y][x].isMine) {
          this.board[y][x].isOpen = true;
        }
      }
    }
  }

  // Перемещение мин, исключая первую открытую клетку
  relocateMines(excludeX, excludeY) {
    for (let y=0; y<HEIGHT; y++) {
      for (let x=0; x<WIDTH; x++) {
        this.board[y][x].isMine = false;
      }
    }
    let count = 0;
    while (count < MINES_COUNT) {
      const x = Math.floor(Math.random() * WIDTH);
      const y = Math.floor(Math.random() * HEIGHT);
      if ((x !== excludeX || y !== excludeY) && !this.board[y][x].isMine) {
        this.board[y][x].isMine = true;
        count++;
      }
    }
  }
}

const game = new Game();

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y=0; y<HEIGHT; y++) {
    for (let x=0; x<WIDTH; x++) {
      const cell = game.board[y][x];
      const rectX = x * CELL_SIZE;
      const rectY = y * CELL_SIZE;

      ctx.strokeStyle = 'gray';
      ctx.strokeRect(rectX, rectY, CELL_SIZE, CELL_SIZE);

      if (cell.isOpen) {
        ctx.fillStyle = 'lightgray';
        ctx.fillRect(rectX, rectY, CELL_SIZE, CELL_SIZE);

        if (cell.isMine) {
          ctx.fillStyle = 'black';
          ctx.beginPath();
          ctx.arc(rectX + CELL_SIZE/2, rectY + CELL_SIZE/2, CELL_SIZE/3, 0, Math.PI*2);
          ctx.fill();
        } else if (cell.adjacentMines > 0) {
          ctx.fillStyle = colors[cell.adjacentMines];
          ctx.font = `bold ${CELL_SIZE/2}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(cell.adjacentMines, rectX + CELL_SIZE/2, rectY + CELL_SIZE/2);
        }
      } else if (cell.isFlagged) {
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.moveTo(rectX + 5, rectY + 5);
        ctx.lineTo(rectX + 5, rectY + CELL_SIZE - 5);
        ctx.lineTo(rectX + CELL_SIZE - 5, rectY + (CELL_SIZE/2));
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  if (game.gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = `bold 24px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(game.win ? 'Вы выиграли!' : 'Вы проиграли!', canvas.width/2, canvas.height/2);
  }
}

canvas.addEventListener('click', (e) => {
  if (game.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
  const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
  game.openCell(x, y);
  draw();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (game.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
  const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
  game.toggleFlag(x, y);
  draw();
});

// Добавим метод toggleFlag в класс Game
Game.prototype.toggleFlag = function(x, y) {
  if (this.board[y][x].isOpen) return;
  this.board[y][x].isFlagged = !this.board[y][x].isFlagged;
}

draw();
</script>
</body>
</html>
